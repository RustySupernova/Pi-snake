<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI POLAR - ARCADE STABILITY V8</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #030508; --accent-color: #00ffcc; --danger: #ff3366; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body {
            background-color: var(--bg-color); color: #fff;
            font-family: 'VT323', monospace; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 25px;
            display: flex; justify-content: space-between; z-index: 10; pointer-events: none;
        }
        #target-display { font-family: 'Press Start 2P'; font-size: 14px; color: var(--danger); text-shadow: 0 0 10px var(--danger); }
        #score-display { font-family: 'Press Start 2P'; font-size: 14px; color: var(--accent-color); }
        #settings-btn {
            position: absolute; top: 25px; right: 25px; font-size: 28px; cursor: pointer;
            z-index: 20; pointer-events: auto; opacity: 0.8;
        }
        #pi-chain {
            position: absolute; bottom: 25px; width: 85%; text-align: center;
            font-size: 22px; color: var(--accent-color); opacity: 0.5; pointer-events: none;
            word-break: break-all; line-height: 1.2;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .overlay.visible { display: flex; }
        .panel {
            background: #000; border: 4px solid var(--accent-color);
            padding: 40px; text-align: center; width: 85%; max-width: 420px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2); pointer-events: auto;
        }
        .panel h2 { font-family: 'Press Start 2P'; font-size: 20px; margin-bottom: 30px; color: var(--accent-color); }
        .btn {
            padding: 15px 30px; background: transparent; border: 3px solid var(--accent-color);
            color: var(--accent-color); font-family: 'Press Start 2P'; font-size: 12px; cursor: pointer;
            margin-top: 30px; text-transform: uppercase; transition: all 0.2s;
        }
        .btn:active { background: var(--accent-color); color: #000; }
        .slider-container { margin: 40px 0; text-align: left; }
        .slider-container label { display: block; margin-bottom: 20px; color: var(--accent-color); font-family: 'Press Start 2P'; font-size: 10px; }
        input[type=range] { width: 100%; accent-color: var(--accent-color); cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="target-display">NEXT: 1</div>
        <div id="score-display">NODE: 0</div>
    </div>
    
    <div id="settings-btn" onclick="openSettings()">⚙️</div>
    <div id="pi-chain">3.</div>

    <canvas id="gameCanvas"></canvas>

    <div id="game-over" class="overlay">
        <div class="panel">
            <h2 style="color:var(--danger);">SYSTEM HALTED</h2>
            <p id="final-stat" style="font-size: 28px; color: #888; margin: 20px 0;"></p>
            <button class="btn" onclick="resetGame()">REBOOT</button>
        </div>
    </div>

    <div id="settings-modal" class="overlay">
        <div class="panel">
            <h2>SYSTEM CONFIG</h2>
            <div class="slider-container">
                <label>PULSE SPEED (MS PER MOVE)</label>
                <input type="range" id="speed-slider" min="1" max="100" value="20">
            </div>
            <button class="btn" onclick="closeSettings()">RESUME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const PI_STR = "14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196";
        
        let SIZE, CX, CY;
        const GRID_TH = 36;
        const DR = 38; 
        const VISUAL_HEAD_R = 6; 
        const VISUAL_HEAD_TH = Math.PI / 2; 
        
        let snake, nodes, piIdx, chars;
        let logical_r, logical_th, anim_r, anim_th; 
        let dr, dth, isGameOver, isPaused, lastTime, accumulator;
        let spawnTimestamp = 0;
        let currentStepMs = 1200; // Default slow speed

        document.getElementById('speed-slider').oninput = function() {
            // Mapping: 1 -> 2000ms (Very Slow), 100 -> 300ms (Fastest)
            currentStepMs = 2000 - (this.value * 17);
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            SIZE = Math.max(canvas.width, canvas.height);
            CX = canvas.width / 2;
            CY = canvas.height / 2;
        }
        window.addEventListener('resize', resize);

        function resetGame() {
            piIdx = 0; dr = 0; dth = 0;
            logical_r = 10; logical_th = 0;
            anim_r = 10; anim_th = 0;
            snake = [{ r: 10, th: 0 }];
            chars = ["3."];
            nodes = [];
            spawnTimestamp = Date.now();
            generateSafeNodes();
            isGameOver = false; isPaused = false;
            document.getElementById('game-over').classList.remove('visible');
            document.getElementById('settings-modal').classList.remove('visible');
            updateUI();
        }

        function generateSafeNodes() {
            nodes = [];
            // Target Node
            nodes.push(createTargetNode(PI_STR[piIdx], true));
            // Interference Nodes logic
            if (piIdx >= 10) {
                let count = Math.floor((piIdx - 10) / 10) + 1;
                for (let i = 0; i < count; i++) {
                    nodes.push(createTargetNode(Math.floor(Math.random()*10).toString(), false));
                }
            }
        }

        function createTargetNode(val, isTarget) {
            let r, th, attempts = 0;
            while (attempts < 200) {
                // Priority: Spawn away from snake (radius offset 6-10, angle offset 8-15)
                r = logical_r + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 5) + 6);
                th = logical_th + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 10) + 8);
                let key = `${r},${((th % GRID_TH) + GRID_TH) % GRID_TH}`;
                let occupied = snake.some(s => `${s.r},${((s.th % GRID_TH) + GRID_TH) % GRID_TH}` === key);
                if (!occupied) break;
                attempts++;
            }
            return { r, th, val, isTarget };
        }

        function updatePhysics() {
            if (dr === 0 && dth === 0) return;

            // 10 Second Auto-Respawn
            if (Date.now() - spawnTimestamp > 10000) {
                generateSafeNodes();
                spawnTimestamp = Date.now();
            }

            let nextR = snake[0].r + dr;
            let nextTh = snake[0].th + dth;
            let headKey = `${nextR},${((nextTh % GRID_TH) + GRID_TH) % GRID_TH}`;

            // Self-Collision
            if (snake.some(s => `${s.r},${((s.th % GRID_TH) + GRID_TH) % GRID_TH}` === headKey)) return die();

            let hitIdx = nodes.findIndex(n => `${n.r},${((n.th % GRID_TH) + GRID_TH) % GRID_TH}` === headKey);
            
            if (hitIdx !== -1) {
                let node = nodes[hitIdx];
                if (node.isTarget) {
                    snake.unshift({ r: nextR, th: nextTh });
                    chars.push(node.val);
                    piIdx++;
                    updateUI();
                    generateSafeNodes();
                    spawnTimestamp = Date.now();
                } else {
                    // Interference Penalty
                    if (snake.length > 1) {
                        snake.unshift({ r: nextR, th: nextTh });
                        snake.pop(); // Standard move
                        snake.pop(); // Lose one body segment
                        nodes.splice(hitIdx, 1);
                        nodes.push(createTargetNode(Math.floor(Math.random()*10).toString(), false));
                    } else {
                        return die();
                    }
                }
            } else {
                snake.unshift({ r: nextR, th: nextTh });
                snake.pop();
            }

            logical_r = snake[0].r;
            logical_th = snake[0].th;
        }

        function handleInput(act_dr, act_dth) {
            if (isPaused || isGameOver) return;
            // Prevention of 180-degree turn collision
            if (act_dr !== 0 && act_dr === -dr) return;
            if (act_dth !== 0 && act_dth === -dth) return;
            dr = act_dr; dth = act_dth;
        }

        function draw() {
            ctx.fillStyle = "rgba(3, 5, 8, 0.4)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            anim_r = 0.8 * anim_r + 0.2 * logical_r;
            anim_th = 0.8 * anim_th + 0.2 * logical_th;

            // Polar Grid
            ctx.strokeStyle = "rgba(0, 255, 204, 0.1)";
            for (let i = Math.floor(anim_r) - 15; i <= Math.floor(anim_r) + 15; i++) {
                let vr = (i - anim_r + VISUAL_HEAD_R) * DR;
                if (vr > 0) {
                    ctx.beginPath(); ctx.arc(CX, CY, vr, 0, Math.PI * 2); ctx.stroke();
                }
            }

            // Nodes
            nodes.forEach(n => {
                let vr = (n.r - anim_r + VISUAL_HEAD_R);
                let vth = (n.th - anim_th) * (Math.PI * 2 / GRID_TH) + VISUAL_HEAD_TH;
                let x = CX + vr * DR * Math.cos(vth), y = CY + vr * DR * Math.sin(vth);
                ctx.fillStyle = n.isTarget ? "#00ffcc" : "#ff3366";
                ctx.font = n.isTarget ? "18px 'Press Start 2P'" : "24px 'VT323'";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(n.val, x, y);
            });

            // Snake
            snake.forEach((s, i) => {
                let vr = (s.r - anim_r + VISUAL_HEAD_R);
                let vth = (s.th - anim_th) * (Math.PI * 2 / GRID_TH) + VISUAL_HEAD_TH;
                let x = CX + vr * DR * Math.cos(vth), y = CY + vr * DR * Math.sin(vth);
                ctx.fillStyle = i === 0 ? "#fff" : "rgba(0, 255, 204, 0.6)";
                ctx.beginPath(); ctx.arc(x, y, i === 0 ? 10 : 7, 0, Math.PI * 2); ctx.fill();
            });
        }

        function updateUI() {
            document.getElementById('target-display').innerText = "NEXT: " + PI_STR[piIdx];
            document.getElementById('score-display').innerText = "SCORE: " + piIdx;
            document.getElementById('pi-chain').innerText = "3." + PI_STR.substring(0, piIdx);
        }
        function die() { isGameOver = true; document.getElementById('game-over').classList.add('visible'); document.getElementById('final-stat').innerText = "FINAL SCORE: " + piIdx; }
        function openSettings() { isPaused = true; document.getElementById('settings-modal').classList.add('visible'); }
        function closeSettings() { isPaused = false; document.getElementById('settings-modal').classList.remove('visible'); }

        function tick(timestamp) {
            if (!lastTime) lastTime = timestamp;
            if (!isGameOver && !isPaused) {
                accumulator = (accumulator || 0) + (timestamp - lastTime);
                while (accumulator >= currentStepMs) { updatePhysics(); accumulator -= currentStepMs; }
            }
            lastTime = timestamp; draw(); requestAnimationFrame(tick);
        }

        window.onkeydown = e => {
            if (e.key === "ArrowLeft") handleInput(0, -1); if (e.key === "ArrowRight") handleInput(0, 1);
            if (e.key === "ArrowDown") handleInput(-1, 0); if (e.key === "ArrowUp") handleInput(1, 0);
        };

        let tx, ty;
        canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive: false});
        canvas.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
            if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 30) handleInput(0, dx > 0 ? 1 : -1); }
            else { if (Math.abs(dy) > 30) handleInput(dy > 0 ? -1 : 1, 0); }
        });

        resize(); resetGame(); requestAnimationFrame(tick);
    </script>
</body>
</html>
