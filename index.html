<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI POLAR - INFINITE RELATIVITY V7.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #030508; --accent-color: #00ffcc; --danger: #ff3366; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body {
            background-color: var(--bg-color); color: #fff;
            font-family: 'VT323', monospace; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-between; z-index: 10; pointer-events: none;
        }
        #target-display { font-family: 'Press Start 2P'; font-size: 14px; color: var(--danger); text-shadow: 0 0 8px var(--danger); }
        #score-display { font-family: 'Press Start 2P'; font-size: 14px; color: var(--accent-color); }
        #settings-btn {
            position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer;
            z-index: 20; pointer-events: auto; opacity: 0.7;
        }
        #pi-chain {
            position: absolute; bottom: 20px; width: 90%; text-align: center;
            font-size: 20px; color: var(--accent-color); opacity: 0.5; pointer-events: none;
            word-break: break-all;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .overlay.visible { display: flex; }
        .panel {
            background: rgba(5, 10, 15, 0.95); border: 2px solid var(--accent-color);
            padding: 30px; text-align: center; width: 85%; max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3); pointer-events: auto;
        }
        .panel h2 { font-family: 'Press Start 2P'; font-size: 18px; margin-bottom: 20px; }
        .btn {
            padding: 12px 20px; background: transparent; border: 2px solid var(--accent-color);
            color: var(--accent-color); font-family: 'Press Start 2P'; font-size: 12px; cursor: pointer;
            margin-top: 25px; text-transform: uppercase;
        }
        .slider-container { margin: 30px 0; text-align: left; }
        .slider-container label { display: block; margin-bottom: 15px; color: var(--accent-color); font-size: 18px; }
        input[type=range] { width: 100%; accent-color: var(--accent-color); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="target-display">NEXT: 1</div>
        <div id="score-display">NODE: 0</div>
    </div>
    
    <div id="settings-btn" onclick="openSettings()">⚙️</div>
    <div id="pi-chain">3.</div>

    <canvas id="gameCanvas"></canvas>

    <div id="game-over" class="overlay">
        <div class="panel">
            <h2 style="color:var(--danger);">SYSTEM CRASH</h2>
            <p id="final-stat" style="font-size: 24px; color: #aaa;"></p>
            <button class="btn" onclick="resetGame()">REBOOT</button>
        </div>
    </div>

    <div id="settings-modal" class="overlay">
        <div class="panel">
            <h2 style="color:var(--accent-color);">CORE SETTINGS</h2>
            <div class="slider-container">
                <label>ENGINE SPEED</label>
                <input type="range" id="speed-slider" min="1" max="100" value="40">
            </div>
            <button class="btn" onclick="closeSettings()">RESUME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const PI_STR = "14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196";
        
        let SIZE, CX, CY;
        const GRID_TH = 36;
        const DR = 35; 
        const VISUAL_HEAD_R = 6; 
        const VISUAL_HEAD_TH = Math.PI / 2; 
        
        let snake, nodes, piIdx, chars;
        let logical_r, logical_th, anim_r, anim_th; 
        let dr, dth, isGameOver, isPaused, lastTime, accumulator;
        let spawnTimer = 0;
        let currentStepMs = 600; 

        document.getElementById('speed-slider').oninput = function() {
            // 速度大幅下降：范围从 1200ms (1) 到 300ms (100)
            currentStepMs = 1200 - (this.value * 9);
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            SIZE = Math.max(canvas.width, canvas.height);
            CX = canvas.width / 2;
            CY = canvas.height / 2 - 50; 
        }
        window.addEventListener('resize', resize);

        function resetGame() {
            piIdx = 0; dr = 0; dth = 0;
            logical_r = 10; logical_th = 0;
            anim_r = 10; anim_th = 0;
            snake = [{ r: 10, th: 0 }];
            chars = ["3."];
            nodes = [];
            spawnTimer = Date.now();
            generateAllNodes();
            isGameOver = false; isPaused = false;
            document.getElementById('game-over').classList.remove('visible');
            document.getElementById('settings-modal').classList.remove('visible');
            updateUI();
        }

        function generateAllNodes() {
            nodes = [];
            // 生成唯一目标数字
            nodes.push(createOneNode(PI_STR[piIdx], true));
            // 如果分数 > 10，生成干扰数字
            if (piIdx >= 10) {
                let counts = Math.floor((piIdx - 10) / 10) + 1;
                for (let i = 0; i < counts; i++) {
                    nodes.push(createOneNode(Math.floor(Math.random()*10).toString(), false));
                }
            }
        }

        function createOneNode(val, isTarget) {
            let r, th, attempts = 0;
            while (attempts < 100) {
                // 优先选择离蛇较远的地方 (半径距离 5-10 轨道，角度偏移较大)
                r = logical_r + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 5) + 5);
                th = logical_th + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 10) + 8);
                let key = `${r},${((th % GRID_TH) + GRID_TH) % GRID_TH}`;
                let tooClose = snake.some(s => `${s.r},${((s.th % GRID_TH) + GRID_TH) % GRID_TH}` === key);
                if (!tooClose) break;
                attempts++;
            }
            return { r, th, val, isTarget };
        }

        function updatePhysics() {
            if (dr === 0 && dth === 0) return;

            // 检查10秒重新生成逻辑
            if (Date.now() - spawnTimer > 10000) {
                generateAllNodes();
                spawnTimer = Date.now();
            }

            let head = { r: snake[0].r + dr, th: snake[0].th + dth };
            let headKey = `${head.r},${((head.th % GRID_TH) + GRID_TH) % GRID_TH}`;

            // 自撞检测
            if (snake.some(s => `${s.r},${((s.th % GRID_TH) + GRID_TH) % GRID_TH}` === headKey)) return die();

            let hitNodeIdx = nodes.findIndex(n => `${n.r},${((n.th % GRID_TH) + GRID_TH) % GRID_TH}` === headKey);
            
            if (hitNodeIdx !== -1) {
                let node = nodes[hitNodeIdx];
                if (node.isTarget) {
                    snake.unshift(head);
                    chars.push(node.val);
                    piIdx++;
                    updateUI();
                    generateAllNodes();
                    spawnTimer = Date.now();
                } else {
                    // 撞击干扰数字
                    if (snake.length > 1) {
                        snake.unshift(head);
                        snake.pop(); // 正常移动
                        snake.pop(); // 额外扣除一节
                        nodes.splice(hitNodeIdx, 1);
                        nodes.push(createOneNode(Math.floor(Math.random()*10).toString(), false));
                    } else {
                        return die();
                    }
                }
            } else {
                snake.unshift(head);
                snake.pop();
            }

            logical_r = snake[0].r;
            logical_th = snake[0].th;
        }

        function handleInput(new_dr, new_dth) {
            if (isPaused || isGameOver) return;
            // 操作逻辑优化：禁止180度直接自杀式转向
            if (new_dr !== 0 && new_dr === -dr) return;
            if (new_dth !== 0 && new_dth === -dth) return;
            dr = new_dr; dth = new_dth;
        }

        function draw() {
            ctx.fillStyle = "rgba(3, 5, 8, 0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            anim_r = (1 - 0.15) * anim_r + 0.15 * logical_r;
            anim_th = (1 - 0.15) * anim_th + 0.15 * logical_th;

            // 绘制网格
            ctx.strokeStyle = "rgba(0, 255, 204, 0.1)";
            for (let i = Math.floor(anim_r) - 15; i <= Math.floor(anim_r) + 15; i++) {
                let vr = (i - anim_r + VISUAL_HEAD_R) * DR;
                if (vr > 0) {
                    ctx.beginPath(); ctx.arc(CX, CY, vr, 0, Math.PI * 2); ctx.stroke();
                }
            }

            // 绘制节点
            nodes.forEach(n => {
                let vr = (n.r - anim_r + VISUAL_HEAD_R);
                let vth = (n.th - anim_th) * (Math.PI * 2 / GRID_TH) + VISUAL_HEAD_TH;
                let x = CX + vr * DR * Math.cos(vth), y = CY + vr * DR * Math.sin(vth);
                ctx.fillStyle = n.isTarget ? varColor('--accent-color') : varColor('--danger');
                ctx.font = n.isTarget ? "24px 'Press Start 2P'" : "20px 'VT323'";
                ctx.textAlign = "center"; ctx.fillText(n.val, x, y);
            });

            // 绘制蛇
            snake.forEach((s, i) => {
                let vr = (s.r - anim_r + VISUAL_HEAD_R);
                let vth = (s.th - anim_th) * (Math.PI * 2 / GRID_TH) + VISUAL_HEAD_TH;
                let x = CX + vr * DR * Math.cos(vth), y = CY + vr * DR * Math.sin(vth);
                ctx.fillStyle = i === 0 ? "#fff" : "rgba(0, 255, 204, 0.6)";
                ctx.beginPath(); ctx.arc(x, y, i === 0 ? 10 : 7, 0, Math.PI * 2); ctx.fill();
            });
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }
        function updateUI() {
            document.getElementById('target-display').innerText = "NEXT: " + PI_STR[piIdx];
            document.getElementById('score-display').innerText = "SCORE: " + piIdx;
            document.getElementById('pi-chain').innerText = "3." + PI_STR.substring(0, piIdx);
        }
        function die() { isGameOver = true; document.getElementById('game-over').classList.add('visible'); document.getElementById('final-stat').innerText = "SCORE: " + piIdx; }
        function openSettings() { isPaused = true; document.getElementById('settings-modal').classList.add('visible'); }
        function closeSettings() { isPaused = false; document.getElementById('settings-modal').classList.remove('visible'); }

        function tick(timestamp) {
            if (!lastTime) lastTime = timestamp;
            if (!isGameOver && !isPaused) {
                accumulator = (accumulator || 0) + (timestamp - lastTime);
                while (accumulator >= currentStepMs) { updatePhysics(); accumulator -= currentStepMs; }
            }
            lastTime = timestamp; draw(); requestAnimationFrame(tick);
        }

        window.onkeydown = e => {
            if (e.key === "ArrowLeft") handleInput(0, -1); if (e.key === "ArrowRight") handleInput(0, 1);
            if (e.key === "ArrowDown") handleInput(-1, 0); if (e.key === "ArrowUp") handleInput(1, 0);
        };

        let stX, stY;
        canvas.addEventListener('touchstart', e => { stX = e.touches[0].clientX; stY = e.touches[0].clientY; }, {passive: false});
        canvas.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - stX, dy = e.changedTouches[0].clientY - stY;
            if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 30) handleInput(0, dx > 0 ? 1 : -1); }
            else { if (Math.abs(dy) > 30) handleInput(dy > 0 ? -1 : 1, 0); }
        });

        resize(); resetGame(); requestAnimationFrame(tick);
    </script>
</body>
</html>
