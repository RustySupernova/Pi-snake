<!DOCTYPE html>
<html lang=""zh-CN"">
<head>
    <meta charset=""UTF-8"">
    <meta name=""viewport"" content=""width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"">
    <title>圆周率贪吃蛇 v7.0 - 极坐标拓扑版</title>
    <link href=""https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"" rel=""stylesheet"">
    <style>
        :root {
            --bg-color: #050510; --text-color: #ecf0f1;
            --accent-color: #00ffcc; --ui-bg: rgba(0, 255, 204, 0.05);
            --border-color: #003333;
        }

        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        #top-bar {
            width: 100%; height: 50px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 15px; background: var(--ui-bg);
            border-bottom: 2px solid var(--border-color); z-index: 50;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        #game-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 10px; }

        #game-area { 
            position: relative; border-radius: 50%; /* 圆形边框 */
            border: 4px solid var(--border-color); overflow: hidden; 
            background: #000; box-shadow: 0 0 50px rgba(0, 255, 204, 0.1); 
        }
        
        canvas { display: block; touch-action: none; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 40; color: white; padding: 20px;
            backdrop-filter: blur(4px); text-align: center; border-radius: 50%;
        }

        #game-over.visible { display: flex; }

        button.action-btn { 
            padding: 12px 24px; background: transparent; color: var(--accent-color); 
            border: 2px solid var(--accent-color); border-radius: 8px; cursor: pointer; 
            font-weight: bold; margin-top: 20px; font-size: 16px; 
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 2px;
        }
        button.action-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-color); }

        #pi-display { 
            margin-top: 15px; font-size: 16px; color: var(--accent-color); 
            text-align: center; max-width: 500px; word-break: break-all; 
            font-family: 'VT323', monospace; letter-spacing: 2px; opacity: 0.8; 
        }
        
        #target-digit-container { 
            margin-bottom: 10px; font-size: 16px; display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid #333;
        }
        
        .warn-text { color: #ff3366; font-size: 12px; font-weight: normal; margin-left: 10px; }
        
        .controls-hint {
            display: flex; gap: 15px; font-size: 12px; color: #888; margin-top: 10px;
        }
        .controls-hint span { background: #222; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id=""top-bar"">
        <h1 style=""font-size:16px; margin:0; letter-spacing:2px; font-family: 'Press Start 2P', cursive;"">π <span style=""color:var(--accent-color)"">POLAR</span></h1>
        <div style=""font-family: 'VT323'; font-size: 20px; color: var(--accent-color);"">SCORE: <span id=""score-val"">0</span></div>
    </div>

    <div id=""game-wrapper"">
        <div id=""target-digit-container"">
            下一个目标基站: <span id=""target-digit"" style=""color:var(--accent-color); font-size: 28px; font-family: 'Press Start 2P', cursive; text-shadow: 0 0 10px var(--accent-color);"">1</span>
            <span class=""warn-text"">触碰非目标基站将导致死亡！</span>
        </div>
        
        <div id=""game-area"">
            <canvas id=""gameCanvas""></canvas>
            
            <div id=""game-over"" class=""overlay"">
                <h2 style=""font-size:32px; color:#ff3366; font-family: 'Press Start 2P', cursive; margin-bottom: 10px;"">连接断开</h2>
                <p style=""font-size:16px; color: #aaa;"">你成功打卡了 Pi 的前 <span id=""final-score"" style=""font-weight:bold; color:var(--accent-color); font-size: 24px;"">0</span> 个节点</p>
                <button id=""reset-btn"" class=""action-btn"">重新校准</button>
            </div>
        </div>
        
        <div class=""controls-hint"">
            <span>⬆️ 远离圆心</span>
            <span>⬇️ 靠近圆心</span>
            <span>⬅️ 逆时针</span>
            <span>➡️ 顺时针</span>
        </div>
        
        <div id=""pi-display"">3.</div>
    </div>

    <script>
        const canvas = document.getElementById(""gameCanvas"");
        const ctx = canvas.getContext(""2d"");
        const piDisplayEl = document.getElementById(""pi-display"");
        const targetDigitEl = document.getElementById(""target-digit"");
        const gameOverScreen = document.getElementById(""game-over"");
        const scoreValEl = document.getElementById(""score-val"");
        const finalScoreEl = document.getElementById(""final-score"");

        const PI_DIGITS = ""14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196"";
        
        // 极坐标网格系统参数
        const GRID_R = 12;      // 径向分层（12个同心圆环）
        const GRID_TH = 36;     // 角向分段（36个扇区，每扇区10度）
        const SIZE = 480;       // 画布尺寸
        const CX = SIZE / 2;    // 圆心X
        const CY = SIZE / 2;    // 圆心Y
        const MAX_RADIUS = (SIZE / 2) - 10; 
        const DR = MAX_RADIUS / GRID_R; // 每个环的宽度

        let snake, chars, dr_dir, dth_dir, piIndex, gameOver;
        let gameTime = 0, lastRealTime = 0, physicsAccumulator = 0;
        let currentSpeedMs = 150; // 极坐标下需要稍微慢一点给玩家思考时间
        let nodes = []; // 10个固定的数字基站
        let pulsePhase = 0;

        function init() {
            canvas.width = SIZE; canvas.height = SIZE;
            document.getElementById(""reset-btn"").onclick = resetGame;
            resetGame();
            requestAnimationFrame(gameLoop); 
        }

        // 将极坐标 (r, th) 转换为笛卡尔坐标 (x, y) 用于绘制
        function getCartesian(r, th) {
            // 取网格单元的中心点
            let radius = (r - 0.5) * DR;
            let angle = th * (2 * Math.PI / GRID_TH);
            return {
                x: CX + radius * Math.cos(angle),
                y: CY + radius * Math.sin(angle)
            };
        }

        // 生成 10 个不重叠的固定基站
        function initNodes() {
            nodes = [];
            let available = [];
            // 避免最内层(r=1)和最外层(r=12)生成节点，防止太靠近边缘被卡死
            for(let r = 2; r <= GRID_R - 1; r++) {
                for(let th = 0; th < GRID_TH; th++) {
                    available.push({r, th});
                }
            }
            // 随机打乱并抽取 10 个位置
            available.sort(() => Math.random() - 0.5);
            
            for(let i = 0; i < 10; i++) {
                nodes.push({
                    val: i.toString(),
                    r: available[i].r,
                    th: available[i].th
                });
            }
        }

        function resetGame() {
            initNodes();
            // 找一个不和节点重叠的空地出生
            let start_r = Math.floor(GRID_R / 2);
            let start_th = 0;
            while(nodes.some(n => n.r === start_r && n.th === start_th)) {
                start_th++;
            }

            snake = [{r: start_r, th: start_th}]; 
            chars = [""3.""];
            dr_dir = 0; dth_dir = 0; // 初始静止
            piIndex = 0; gameOver = false;
            gameOverScreen.classList.remove(""visible"");
            updateUI();
        }

        function updateUI() {
            targetDigitEl.innerText = PI_DIGITS[piIndex];
            piDisplayEl.innerText = chars.join("""");
            scoreValEl.innerText = piIndex;
        }

        function updatePhysics() {
            if (gameOver || (dr_dir === 0 && dth_dir === 0)) return;
            
            // 计算极坐标下的新头部位置
            let new_r = snake[0].r + dr_dir;
            // 角度环形跨越 (0 到 35)
            let new_th = (snake[0].th + dth_dir + GRID_TH) % GRID_TH;
            
            // 1. 边界碰撞检测 (中心黑洞 和 宇宙边缘)
            if (new_r < 1 || new_r > GRID_R) return endGame();
            
            // 2. 自我碰撞检测
            for (let s of snake) {
                if (s.r === new_r && s.th === new_th) return endGame();
            }

            // 移动头部
            snake.unshift({r: new_r, th: new_th});
            
            // 3. 信标碰撞检测
            let hitNode = nodes.find(n => n.r === new_r && n.th === new_th);
            
            if (hitNode) {
                if (hitNode.val === PI_DIGITS[piIndex]) {
                    // 吃对了！长度增加
                    chars.push(PI_DIGITS[piIndex++]);
                    updateUI();
                    
                    // 特别提示：如果下一个数字和当前一样，必须先离开再吃
                    if (PI_DIGITS[piIndex] === hitNode.val) {
                        // TODO: 可以加入特殊提示音效或者小闪烁
                    }
                } else {
                    // 碰到了非目标基站 -> 在拓扑模式下，这是致命的障碍墙！
                    endGame(); 
                    return;
                }
            } else {
                snake.pop(); // 没吃到东西，正常移动，砍掉尾巴
            }
        }

        // ============ 核心渲染 ============
        function gameLoop(timestamp) {
            if (!lastRealTime) lastRealTime = timestamp;
            let dt = timestamp - lastRealTime;
            lastRealTime = timestamp;

            if (!gameOver) {
                gameTime += dt;
                physicsAccumulator += dt;
                pulsePhase += dt * 0.005; // 脉冲动画

                while (physicsAccumulator >= currentSpeedMs) {
                    updatePhysics();
                    physicsAccumulator -= currentSpeedMs;
                }
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = ""rgba(5, 5, 16, 0.9)""; // 拖尾残影效果
            ctx.fillRect(0, 0, SIZE, SIZE);

            // 1. 绘制极坐标网格背景 (Radar style)
            ctx.strokeStyle = ""rgba(0, 255, 204, 0.08)"";
            ctx.lineWidth = 1;
            
            // 同心圆 (Rings)
            for (let r = 1; r <= GRID_R; r++) {
                ctx.beginPath();
                ctx.arc(CX, CY, r * DR, 0, 2 * Math.PI);
                ctx.stroke();
            }
            // 射线 (Angles)
            for (let th = 0; th < GRID_TH; th++) {
                ctx.beginPath();
                let angle = th * (2 * Math.PI / GRID_TH);
                ctx.moveTo(CX + DR * Math.cos(angle), CY + DR * Math.sin(angle)); // 留空中心黑洞
                ctx.lineTo(CX + MAX_RADIUS * Math.cos(angle), CY + MAX_RADIUS * Math.sin(angle));
                ctx.stroke();
            }

            ctx.textAlign = ""center""; ctx.textBaseline = ""middle"";
            ctx.font = ""bold 14px 'VT323', monospace"";

            // 2. 绘制固定的十个数字基站
            let currentTarget = PI_DIGITS[piIndex];
            nodes.forEach(n => {
                let pos = getCartesian(n.r, n.th);
                let isTarget = (n.val === currentTarget);
                
                // 目标节点：脉冲发光 + 绿蓝相间
                if (isTarget) {
                    let pulse = Math.abs(Math.sin(pulsePhase)) * 10 + 5;
                    ctx.shadowBlur = pulse;
                    ctx.shadowColor = ""#00ffcc"";
                    ctx.fillStyle = ""#ffffff"";
                    
                    // 画基站外圈发光环
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 12, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 204, ${Math.abs(Math.sin(pulsePhase)) * 0.5 + 0.2})`;
                    ctx.fill();
                    ctx.fillStyle = ""#ffffff"";
                } else {
                    // 非目标节点：暗红警告色 (碰到会死)
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = ""rgba(255, 51, 102, 0.4)"";
                }
                
                // 画基站里的数字
                ctx.font = isTarget ? ""bold 18px 'Press Start 2P', cursive"" : ""14px 'VT323', monospace"";
                ctx.fillText(n.val, pos.x, pos.y);
            });

            // 3. 绘制蛇的身体
            snake.forEach((s, i) => {
                let isHead = (i === 0);
                let pos = getCartesian(s.r, s.th);
                
                // 身体的霓虹拖尾发光
                ctx.shadowBlur = isHead ? 20 : 10;
                ctx.shadowColor = isHead ? ""#00ffcc"" : ""#0099ff"";
                ctx.fillStyle = isHead ? ""#ffffff"" : `rgba(0, 204, 255, ${1 - i/snake.length*0.5})`;
                
                // 极坐标下的蛇并不是方形的，画个圆点代表能量节点
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, isHead ? 8 : 6, 0, Math.PI * 2);
                ctx.fill();
                
                // 关掉阴影写字
                ctx.shadowBlur = 0;
                ctx.fillStyle = isHead ? ""#000000"" : ""#ffffff"";
                ctx.font = isHead ? ""bold 12px sans-serif"" : ""10px 'VT323'"";
                ctx.fillText(chars[i], pos.x, pos.y);
            });

            // 4. 绘制中心黑洞 (Ring 0)
            ctx.beginPath();
            ctx.arc(CX, CY, DR * 0.9, 0, 2 * Math.PI);
            ctx.fillStyle = ""#000000"";
            ctx.fill();
            ctx.strokeStyle = ""#ff3366"";
            ctx.stroke();
        }

        function endGame() {
            gameOver = true; 
            gameOverScreen.classList.add(""visible"");
            finalScoreEl.innerText = piIndex;
        }

        // ============ 极坐标操控逻辑 ============
        // 极坐标的方向与笛卡尔完全不同，需要重新映射按键含义
        document.onkeydown = e => {
            if([""ArrowUp"",""ArrowDown"",""ArrowLeft"",""ArrowRight""].includes(e.key)) e.preventDefault();
            
            if (e.key === 'ArrowUp' && dr_dir === 0) { 
                // 向上 = 向外公转 (远离圆心 r++)
                dr_dir = 1; dth_dir = 0; 
            }
            if (e.key === 'ArrowDown' && dr_dir === 0) { 
                // 向下 = 向内坠落 (靠近圆心 r--)
                dr_dir = -1; dth_dir = 0; 
            }
            if (e.key === 'ArrowLeft' && dth_dir === 0) { 
                // 向左 = 逆时针运动 (th--)
                dr_dir = 0; dth_dir = -1; 
            }
            if (e.key === 'ArrowRight' && dth_dir === 0) { 
                // 向右 = 顺时针运动 (th++)
                dr_dir = 0; dth_dir = 1; 
            }
        };

        init();
    </script>
</body>
</html>
