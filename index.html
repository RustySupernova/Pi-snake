"<!DOCTYPE html>

<html lang=""zh-CN"">

<head>

    <meta charset=""UTF-8"">

    <meta name=""viewport"" content=""width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"">

    <title>圆周率贪吃蛇 - Pi Snake</title>

    <style>

        :root {

            --bg-color: #2c3e50;

            --text-color: #ecf0f1;

            --accent-color: #f1c40f;

        }

        body {

            background-color: var(--bg-color);

            color: var(--text-color);

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;

            flex-direction: column;

            align-items: center;

            margin: 0;

            padding: 10px;

            touch-action: none; /* 防止移动端滑动时页面滚动 */

            transition: background-color 0.3s, color 0.3s;

        }

        h1 { margin: 10px 0; font-size: 28px; }

        

        /* 顶部信息栏 */

        #ui-panel {

            width: 100%;

            max-width: 500px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 10px;

            font-size: 16px;

            font-weight: bold;

        }

        

        #game-container { position: relative; }

        

        canvas {

            background-color: #34495e;

            border: 4px solid #bdc3c7;

            border-radius: 8px;

            box-shadow: 0 10px 20px rgba(0,0,0,0.3);

            display: block;

            transition: filter 0.3s;

        }

        

        /* 显示圆周率的区域 */

        #pi-display {

            width: 100%;

            max-width: 500px;

            word-wrap: break-word;

            text-align: center;

            margin-top: 15px;

            font-size: 18px;

            letter-spacing: 2px;

            color: var(--accent-color);

            height: 60px;

            overflow-y: auto;

        }



        /* 菜单按钮 */

        #menu-btn {

            position: absolute;

            top: 15px;

            right: 15px;

            background: rgba(255,255,255,0.2);

            border: none;

            color: var(--text-color);

            padding: 8px 12px;

            border-radius: 5px;

            cursor: pointer;

            font-size: 16px;

            z-index: 10;

        }



        /* 设置菜单遮罩 */

        #settings-menu {

            position: absolute;

            top: 0; left: 0; width: 100%; height: 100%;

            background: rgba(0, 0, 0, 0.85);

            display: none;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            border-radius: 8px;

            z-index: 20;

            color: white;

        }

        .setting-item { margin: 10px 0; display: flex; align-items: center; gap: 10px; }

        select, input[type=""color""] { padding: 5px; font-size: 16px; border-radius: 4px; }

        

        #game-over {

            position: absolute;

            top: 0; left: 0; width: 100%; height: 100%;

            background: rgba(0, 0, 0, 0.8);

            display: none;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            border-radius: 8px;

            z-index: 15;

        }

        #game-over h2 { color: #e74c3c; font-size: 32px; margin-bottom: 10px; }

        button.action-btn {

            padding: 10px 20px;

            font-size: 16px;

            cursor: pointer;

            background-color: #2ecc71;

            color: white;

            border: none;

            border-radius: 5px;

            margin-top: 15px;

        }

        .instructions { font-size: 12px; opacity: 0.7; margin-top: 5px; text-align: center;}

        

        /* 自定义颜色面板隐藏 */

        #custom-colors { display: none; flex-direction: column; gap: 5px; margin-top: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;}

    </style>

</head>

<body>



    <button id=""menu-btn"" onclick=""toggleMenu()"">⚙️ 设置</button>

    <h1>π 贪吃蛇</h1>

    

    <div id=""ui-panel"">

        <div>长度: <span id=""score"">1</span></div>

        <div>找数字: <span id=""target-digit"" style=""color:#e74c3c; font-size: 22px;"">1</span></div>

    </div>



    <div id=""game-container"">

        <canvas id=""gameCanvas""></canvas>

        

        <div id=""game-over"">

            <h2>游戏结束!</h2>

            <p>背到了圆周率后 <span id=""final-score"">0</span> 位</p>

            <button class=""action-btn"" onclick=""resetGame()"">再来一次</button>

        </div>



        <div id=""settings-menu"">

            <h2>游戏设置</h2>

            <div class=""setting-item"">

                <label>难度 (速度):</label>

                <select id=""speed-select"" onchange=""changeSpeed(this.value)"">

                    <option value=""200"">慢速 (新手)</option>

                    <option value=""150"" selected>中速 (普通)</option>

                    <option value=""100"">快速 (困难)</option>

                    <option value=""60"">极速 (噩梦)</option>

                </select>

            </div>

            <div class=""setting-item"">

                <label>画面风格:</label>

                <select id=""theme-select"" onchange=""changeTheme(this.value)"">

                    <option value=""default"">默认经典</option>

                    <option value=""retro"">复古泛黄</option>

                    <option value=""neon"">赛博霓虹</option>

                    <option value=""custom"">自选颜色</option>

                </select>

            </div>

            <div id=""custom-colors"">

                <div>背景: <input type=""color"" id=""color-bg"" value=""#34495e"" onchange=""updateCustomColors()""></div>

                <div>蛇头: <input type=""color"" id=""color-head"" value=""#2ecc71"" onchange=""updateCustomColors()""></div>

                <div>蛇身: <input type=""color"" id=""color-body"" value=""#1abc9c"" onchange=""updateCustomColors()""></div>

            </div>

            <button class=""action-btn"" onclick=""toggleMenu()"">继续游戏</button>

        </div>

    </div>



    <div id=""pi-display"">3.</div>

    <div class=""instructions"">电脑使用方向键 ⬆️⬇️⬅️➡️ 控制<br>手机直接在屏幕上 👆 滑动控制方向</div>



    <script>

        const canvas = document.getElementById(""gameCanvas"");

        const ctx = canvas.getContext(""2d"");

        const scoreEl = document.getElementById(""score"");

        const targetDigitEl = document.getElementById(""target-digit"");

        const piDisplayEl = document.getElementById(""pi-display"");

        const gameOverScreen = document.getElementById(""game-over"");

        const settingsMenu = document.getElementById(""settings-menu"");



        // 圆周率

        const PI_DIGITS = ""14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196"";



        // 响应式画布尺寸计算

        const maxCanvasSize = 500;

        let canvasSize = Math.min(window.innerWidth - 20, maxCanvasSize);

        canvas.width = canvasSize;

        canvas.height = canvasSize;



        const GRID_SIZE = 20; // 屏幕固定为20x20个格子

        const TILE_SIZE = canvasSize / GRID_SIZE;



        let snake, chars, dx, dy, food, piIndex, gameOver, gameLoop, isPaused = false;

        let currentSpeed = 150;

        

        // 主题配置

        let activeTheme = ""default"";

        const themes = {

            default: { bg: ""#34495e"", head: ""#2ecc71"", body: ""#1abc9c"", food: ""#e74c3c"", glow: false },

            retro:   { bg: ""#d7ccc8"", head: ""#5d4037"", body: ""#795548"", food: ""#d84315"", glow: false },

            neon:    { bg: ""#000000"", head: ""#00ffff"", body: ""#ff00ff"", food: ""#39ff14"", glow: true },

            custom:  { bg: ""#34495e"", head: ""#2ecc71"", body: ""#1abc9c"", food: ""#e74c3c"", glow: false }

        };



        function resetGame() {

            snake = [{x: Math.floor(GRID_SIZE/2), y: Math.floor(GRID_SIZE/2)}]; 

            chars = [""3.""];

            dx = 0; dy = 0; piIndex = 0; gameOver = false;

            gameOverScreen.style.display = ""none"";

            

            spawnFood();

            updateUI();

            

            if(gameLoop) clearInterval(gameLoop);

            gameLoop = setInterval(update, currentSpeed);

        }



        function spawnFood() {

            let valid = false;

            while (!valid) {

                food = { x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) };

                valid = true;

                for (let segment of snake) {

                    if (segment.x === food.x && segment.y === food.y) { valid = false; break; }

                }

            }

        }



        function updateUI() {

            scoreEl.innerText = chars.length;

            targetDigitEl.innerText = PI_DIGITS[piIndex];

            piDisplayEl.innerText = chars.join("""");

        }



        function update() {

            if (gameOver || isPaused || (dx === 0 && dy === 0)) return;



            const newHead = {x: snake[0].x + dx, y: snake[0].y + dy};



            // 撞墙

            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {

                endGame(); return;

            }

            // 撞自己

            for (let segment of snake) {

                if (newHead.x === segment.x && newHead.y === segment.y) {

                    endGame(); return;

                }

            }



            snake.unshift(newHead);



            // 吃食物

            if (newHead.x === food.x && newHead.y === food.y) {

                chars.push(PI_DIGITS[piIndex]); 

                piIndex++;

                spawnFood();

                updateUI();

            } else {

                snake.pop(); 

            }

            draw();

        }



        function draw() {

            let t = themes[activeTheme];



            // 画背景

            ctx.fillStyle = t.bg;

            ctx.fillRect(0, 0, canvas.width, canvas.height);



            // 设置发光效果 (霓虹主题)

            if(t.glow) {

                ctx.shadowBlur = 15;

                canvas.style.boxShadow = ""0 0 20px #0ff, 0 0 40px #f0f"";

            } else {

                ctx.shadowBlur = 0;

                canvas.style.boxShadow = ""0 10px 20px rgba(0,0,0,0.3)"";

            }



            // 画食物

            ctx.shadowColor = t.food;

            ctx.fillStyle = t.food;

            ctx.font = ""bold "" + (TILE_SIZE * 0.8) + ""px Arial"";

            ctx.textAlign = ""center"";

            ctx.textBaseline = ""middle"";

            ctx.fillText(PI_DIGITS[piIndex], food.x * TILE_SIZE + TILE_SIZE/2, food.y * TILE_SIZE + TILE_SIZE/2);



            // 画蛇

            for (let i = 0; i < snake.length; i++) {

                ctx.fillStyle = i === 0 ? t.head : t.body;

                ctx.shadowColor = ctx.fillStyle;

                ctx.fillText(chars[i], snake[i].x * TILE_SIZE + TILE_SIZE/2, snake[i].y * TILE_SIZE + TILE_SIZE/2);

            }

        }



        function endGame() {

            gameOver = true;

            gameOverScreen.style.display = ""flex"";

            document.getElementById(""final-score"").innerText = piIndex;

        }



        // ============ 菜单与设置 ============

        function toggleMenu() {

            isPaused = !isPaused;

            settingsMenu.style.display = isPaused ? ""flex"" : ""none"";

        }



        function changeSpeed(speed) {

            currentSpeed = parseInt(speed);

            if(!gameOver) {

                clearInterval(gameLoop);

                gameLoop = setInterval(update, currentSpeed);

            }

        }



        function changeTheme(themeName) {

            activeTheme = themeName;

            document.getElementById(""custom-colors"").style.display = (themeName === 'custom') ? 'flex' : 'none';

            

            // 修改网页整体背景配色

            if(themeName === 'retro') {

                document.documentElement.style.setProperty('--bg-color', '#8d6e63');

                document.documentElement.style.setProperty('--text-color', '#efebe9');

            } else if(themeName === 'neon') {

                document.documentElement.style.setProperty('--bg-color', '#111');

                document.documentElement.style.setProperty('--text-color', '#0ff');

            } else {

                document.documentElement.style.setProperty('--bg-color', '#2c3e50');

                document.documentElement.style.setProperty('--text-color', '#ecf0f1');

            }

            draw();

        }



        function updateCustomColors() {

            themes.custom.bg = document.getElementById(""color-bg"").value;

            themes.custom.head = document.getElementById(""color-head"").value;

            themes.custom.body = document.getElementById(""color-body"").value;

            draw();

        }



        // ============ 控制逻辑 (键盘 + 触摸滑动) ============

        

        // 键盘控制

        document.addEventListener(""keydown"", e => {

            if([""ArrowUp"",""ArrowDown"",""ArrowLeft"",""ArrowRight""].includes(e.code)) e.preventDefault();

            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }

            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }

            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }

            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }

        });



        // 移动端滑动 (Swipe) 控制

        let touchStartX = 0, touchStartY = 0;

        canvas.addEventListener('touchstart', function(e) {

            e.preventDefault(); // 防止双击放大和滚动

            touchStartX = e.changedTouches[0].screenX;

            touchStartY = e.changedTouches[0].screenY;

        }, { passive: false });



        canvas.addEventListener('touchend', function(e) {

            e.preventDefault();

            let touchEndX = e.changedTouches[0].screenX;

            let touchEndY = e.changedTouches[0].screenY;

            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);

        }, { passive: false });



        function handleSwipe(startX, startY, endX, endY) {

            let diffX = endX - startX;

            let diffY = endY - startY;

            // 设定滑动最小阈值，防止误触

            if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;



            if (Math.abs(diffX) > Math.abs(diffY)) {

                // 水平滑动

                if (diffX > 0 && dx === 0) { dx = 1; dy = 0; } // 右

                else if (diffX < 0 && dx === 0) { dx = -1; dy = 0; } // 左

            } else {

                // 垂直滑动

                if (diffY > 0 && dy === 0) { dx = 0; dy = 1; } // 下

                else if (diffY < 0 && dy === 0) { dx = 0; dy = -1; } // 上

            }

        }



        resetGame();

        draw();

    </script>

</body>

</html>"
