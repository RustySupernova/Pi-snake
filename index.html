<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圆周率贪吃蛇 v5.0 - 硬核挑战版</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Pixelify+Sans&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ecf0f1;
            --accent-color: #f1c40f;
            --main-font: 'Segoe UI', sans-serif;
            --ui-bg: rgba(255, 255, 255, 0.05);
            --border-color: #444;
        }

        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--main-font); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; transition: background-color 0.5s;
        }

        #top-bar {
            width: 100%; height: 50px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 15px; background: var(--ui-bg);
            border-bottom: 2px solid var(--border-color); z-index: 50;
        }

        #menu-btn { background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        #menu-btn:hover { opacity: 1; }

        #game-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 10px; }

        #game-area { position: relative; border-radius: 12px; border: 4px solid var(--border-color); overflow: hidden; background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        canvas { display: block; touch-action: none; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 40; color: white; padding: 20px;
            backdrop-filter: blur(5px); text-align: center;
        }

        #settings-menu.visible, #game-over.visible { display: flex; }

        .setting-item { margin: 12px 0; display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 320px; }
        label { font-weight: bold; font-size: 14px; opacity: 0.9; }
        select, input[type="range"] { padding: 6px; font-size: 14px; border-radius: 6px; width: 160px; background: #2c3e50; color: white; border: 1px solid #444; }
        
        button.action-btn { padding: 12px 24px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; transition: background 0.2s; }
        button.action-btn:hover { background: #27ae60; }

        #pi-display { margin-top: 15px; font-size: 16px; color: var(--accent-color); text-align: center; max-width: 500px; word-break: break-all; font-family: 'Courier New', monospace; letter-spacing: 1px; opacity: 0.8; }
        #target-digit-container { margin-bottom: 15px; font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        
        .punish-text { color: #e74c3c; font-size: 14px; font-weight: normal; margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
        .show-punish { opacity: 1; }
    </style>
</head>
<body>

    <div id="top-bar">
        <h1 style="font-size:18px; margin:0; letter-spacing:1px;">π SNAKE <span style="font-size:12px; opacity:0.5;">v5.0</span></h1>
        <button id="menu-btn">⚙️</button>
    </div>

    <div id="game-wrapper">
        <div id="target-digit-container">
            寻找数字: <span id="target-digit" style="color:#e74c3c; font-size: 32px; font-family: 'Press Start 2P', cursive;">1</span>
            <span id="punish-msg" class="punish-text">-1 惩罚!</span>
        </div>
        
        <div id="game-area">
            <canvas id="gameCanvas"></canvas>
            
            <div id="game-over" class="overlay">
                <h2 style="font-size:36px; color:#e74c3c;">游戏结束</h2>
                <p style="font-size:18px;">你背到了 π 的后 <span id="final-score" style="font-weight:bold; color:#f1c40f;">0</span> 位</p>
                <button id="reset-btn" class="action-btn">再来一次</button>
            </div>

            <div id="settings-menu" class="overlay">
                <h2 style="margin-top:0; font-size:28px;">游戏设置</h2>
                
                <div class="setting-item">
                    <label>移动速度 (1-10):</label>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <input type="range" id="speed-slider" min="1" max="10" value="5" style="width:120px;">
                        <span id="speed-val" style="width:20px; text-align:right;">5</span>
                    </div>
                </div>

                <div class="setting-item">
                    <label>游戏难度:</label>
                    <select id="diff-select">
                        <option value="1">初级 (固定单个)</option>
                        <option value="2">中级 (限时掉落)</option>
                        <option value="3" selected>高级 (干扰数字)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>画面风格:</label>
                    <select id="theme-select">
                        <option value="neon" selected>动态霓虹 (炫波)</option>
                        <option value="retro">复古像素 (黑白)</option>
                        <option value="default">默认经典</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>数字字体:</label>
                    <select id="font-select">
                        <option value="'Press Start 2P'">像素: Press Start</option>
                        <option value="'VT323'">像素: VT323</option>
                        <option value="Arial">无衬线: Arial</option>
                    </select>
                </div>

                <button id="save-settings-btn" class="action-btn">开始/继续</button>
            </div>
        </div>
        <div id="pi-display">3.</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const piDisplayEl = document.getElementById("pi-display");
        const targetDigitEl = document.getElementById("target-digit");
        const gameOverScreen = document.getElementById("game-over");
        const settingsMenu = document.getElementById("settings-menu");
        const finalScoreEl = document.getElementById("final-score");
        const punishMsg = document.getElementById("punish-msg");

        const PI_DIGITS = "14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196";

        const GRID = 20; 
        const SIZE = 500; 
        const TILE = SIZE / GRID;

        let snake, chars, dx, dy, piIndex, gameOver, isPaused = false;
        
        // 游戏核心时间与速度
        let gameTime = 0;
        let lastRealTime = 0;
        let physicsAccumulator = 0;
        let currentSpeedMs = 140; // 默认速度
        let difficulty = 3; 
        
        let foods = []; 
        let pendingSpawns = []; // 待复活的数字 {time, isCorrect}

        let currentFont = "'Press Start 2P'"; 
        let activeTheme = "neon";
        let neonHue = 0; 

        const themes = {
            default: { bg: "#34495e", head: "#2ecc71", body: "#1abc9c", food: "#e74c3c", glow: false, wave: false },
            retro:   { bg: "#1a1a1a", head: "#ffffff", body: "#555555", food: "#ff0000", glow: false, wave: false },
            neon:    { bg: "#000000", head: "#ffffff", body: "#ffffff", food: "#39ff14", glow: true, wave: true }
        };

        function init() {
            canvas.width = SIZE; canvas.height = SIZE;
            resize();
            window.addEventListener('resize', resize);
            
            // 绑定事件
            document.getElementById("menu-btn").onclick = toggleSettings;
            document.getElementById("save-settings-btn").onclick = toggleSettings;
            document.getElementById("reset-btn").onclick = resetGame;
            document.getElementById("font-select").onchange = e => currentFont = e.target.value;
            document.getElementById("theme-select").onchange = e => activeTheme = e.target.value;
            document.getElementById("diff-select").onchange = e => { difficulty = parseInt(e.target.value); resetGame(); };
            
            const speedSlider = document.getElementById("speed-slider");
            const speedVal = document.getElementById("speed-val");
            speedSlider.oninput = e => {
                let val = parseInt(e.target.value);
                speedVal.innerText = val;
                // 滑块1=260ms (慢), 5=140ms, 10=50ms (极快) -> 公式: 290 - (val * 24)
                currentSpeedMs = 290 - (val * 24); 
            };
            
            resetGame();
            requestAnimationFrame(gameLoop); 
        }

        function resize() {
            let dim = Math.min(window.innerWidth - 40, window.innerHeight - 250, SIZE);
            canvas.style.width = dim + "px";
            canvas.style.height = dim + "px";
        }

        function resetGame() {
            snake = [{x: 10, y: 10}]; 
            chars = ["3."];
            dx = 0; dy = 0; piIndex = 0; 
            gameOver = false; isPaused = false;
            gameOverScreen.classList.remove("visible");
            
            foods = [];
            pendingSpawns = [];
            spawnFood(true); // 始终生成1个正确的
            if (difficulty === 3) {
                spawnFood(false); // 高级难度额外生成2个错误干扰项
                spawnFood(false);
            }
            updateUI();
        }

        // 生成食物：isCorrect 决定生成正确的下一位圆周率，还是随机错误数字
        function spawnFood(isCorrect) {
            let attempts = 0;
            let valid = false;
            let newFood = {};
            while (!valid && attempts < 100) {
                newFood.x = Math.floor(Math.random() * GRID);
                newFood.y = Math.floor(Math.random() * GRID);
                valid = true;
                for (let s of snake) if (s.x === newFood.x && s.y === newFood.y) valid = false;
                for (let f of foods) if (f.x === newFood.x && f.y === newFood.y) valid = false;
                attempts++;
            }
            
            if (isCorrect) {
                newFood.value = PI_DIGITS[piIndex];
            } else {
                let wrongDigit;
                do { wrongDigit = Math.floor(Math.random() * 10).toString(); } 
                while (wrongDigit === PI_DIGITS[piIndex]);
                newFood.value = wrongDigit;
            }
            
            newFood.isCorrect = isCorrect;
            newFood.spawnTime = gameTime;
            foods.push(newFood);
        }

        function updateUI() {
            targetDigitEl.innerText = PI_DIGITS[piIndex];
            piDisplayEl.innerText = chars.join("");
        }

        function showPunishment() {
            punishMsg.classList.add("show-punish");
            setTimeout(() => punishMsg.classList.remove("show-punish"), 1000);
        }

        // 更新游戏物理逻辑
        function updatePhysics() {
            if (gameOver || isPaused || (dx === 0 && dy === 0)) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 撞墙或撞自己
            if (head.x<0 || head.x>=GRID || head.y<0 || head.y>=GRID) return endGame();
            for (let s of snake) if (s.x === head.x && s.y === head.y) return endGame();
            
            snake.unshift(head); // 先移动蛇头
            
            // 检测是否吃到数字
            let hitIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
            
            if (hitIdx !== -1) {
                let hitFood = foods[hitIdx];
                if (hitFood.isCorrect) {
                    // 吃对了！长度增加（不pop尾巴）
                    chars.push(PI_DIGITS[piIndex++]);
                    // 刷新场上所有数字
                    foods = []; pendingSpawns = [];
                    spawnFood(true);
                    if (difficulty === 3) { spawnFood(false); spawnFood(false); }
                    updateUI();
                } else {
                    // 吃错了！(仅高级难度会出现)
                    if (chars.length <= 1) {
                        endGame(); // 仅剩蛇头时吃错直接死亡
                        return;
                    } else {
                        // 惩罚机制：舍弃尾巴
                        snake.pop(); // 抵消刚才移动带来的长度增加
                        snake.pop(); // 惩罚性缩短一格
                        chars.pop(); 
                        piIndex--;
                        showPunishment();
                        
                        // 因为目标数字变了，必须刷新场上的数字避免逻辑死锁
                        foods = []; pendingSpawns = [];
                        spawnFood(true);
                        if (difficulty === 3) { spawnFood(false); spawnFood(false); }
                        updateUI();
                    }
                }
            } else {
                snake.pop(); // 没吃到东西，正常移动，砍掉尾巴保持长度
            }
        }

        // 处理食物过期与重生
        function processFoods() {
            if (difficulty >= 2) {
                // 倒序遍历处理过期，防数组塌陷
                for (let i = foods.length - 1; i >= 0; i--) {
                    if (gameTime - foods[i].spawnTime >= 20000) {
                        // 食物存在超过20秒 -> 消失，进入5秒复活倒计时
                        pendingSpawns.push({ time: gameTime + 5000, isCorrect: foods[i].isCorrect });
                        foods.splice(i, 1);
                    }
                }
                // 处理待复活队列
                for (let i = pendingSpawns.length - 1; i >= 0; i--) {
                    if (gameTime >= pendingSpawns[i].time) {
                        spawnFood(pendingSpawns[i].isCorrect);
                        pendingSpawns.splice(i, 1);
                    }
                }
            }
        }

        // ============ 核心渲染循环 ============
        function gameLoop(timestamp) {
            if (!lastRealTime) lastRealTime = timestamp;
            let dt = timestamp - lastRealTime;
            lastRealTime = timestamp;

            // 如果游戏没有暂停，则累加时间并计算物理帧
            if (!isPaused && !gameOver) {
                gameTime += dt;
                physicsAccumulator += dt;
                // 滑动条实时改变速度，立刻反映在这里
                while (physicsAccumulator >= currentSpeedMs) {
                    updatePhysics();
                    processFoods();
                    physicsAccumulator -= currentSpeedMs;
                }
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            let t = themes[activeTheme];
            neonHue = (neonHue + 4) % 360; 

            ctx.fillStyle = t.bg;
            ctx.fillRect(0, 0, SIZE, SIZE);

            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            let fontSize = (currentFont.includes('Press Start')) ? TILE * 0.6 : TILE * 0.8;
            ctx.font = "bold " + fontSize + "px " + currentFont;

            // 绘制场上的所有数字(食物)
            foods.forEach(f => {
                let age = gameTime - f.spawnTime;
                // 难度 >= 2 时，15秒后开始闪烁 (周期200ms)
                if (difficulty >= 2 && age > 15000) {
                    if (Math.floor(age / 200) % 2 !== 0) return; // 奇数周期跳过绘制，实现闪烁
                }

                ctx.shadowBlur = t.glow ? 20 : 0;
                ctx.shadowColor = t.food;
                ctx.fillStyle = t.food;
                ctx.fillText(f.value, f.x * TILE + TILE/2, f.y * TILE + TILE/2);
            });

            // 绘制蛇
            snake.forEach((s, i) => {
                let cellColor = (i === 0) ? t.head : t.body;
                if (t.wave) {
                    let hueOffset = 15; 
                    let currentCellHue = (neonHue - i * hueOffset + 360) % 360;
                    cellColor = `hsl(${currentCellHue}, 100%, ${i===0 ? '70%' : '55%'})`;
                }

                ctx.shadowBlur = t.glow ? 15 : 0;
                ctx.shadowColor = cellColor;
                ctx.fillStyle = cellColor;
                ctx.fillText(chars[i], s.x * TILE + TILE/2, s.y * TILE + TILE/2);
            });
        }

        function endGame() {
            gameOver = true; isPaused = true;
            gameOverScreen.classList.add("visible");
            finalScoreEl.innerText = piIndex;
        }

        function toggleSettings() {
            isPaused = !isPaused;
            settingsMenu.classList.toggle("visible");
        }

        // ============ 操控判定 ============
        document.onkeydown = e => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
        };

        let tsX, tsY;
        canvas.ontouchstart = e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; };
        canvas.ontouchend = e => {
            let dx_t = e.changedTouches[0].clientX - tsX;
            let dy_t = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx_t) > Math.abs(dy_t)) {
                if (dx_t > 30 && dx === 0) { dx = 1; dy = 0; }
                else if (dx_t < -30 && dx === 0) { dx = -1; dy = 0; }
            } else {
                if (dy_t > 30 && dy === 0) { dx = 0; dy = 1; }
                else if (dy_t < -30 && dy === 0) { dx = 0; dy = -1; }
            }
        };

        init();
    </script>
</body>
</html>
