<!DOCTYPE html>
<html lang=""zh-CN"">
<head>
    <meta charset=""UTF-8"">
    <meta name=""viewport"" content=""width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"">
    <title>圆周率极坐标 v7.1 - 修复版</title>
    <link href=""https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"" rel=""stylesheet"">
    <style>
        :root { --bg-color: #050510; --accent-color: #00ffcc; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body {
            background-color: var(--bg-color); color: #fff;
            font-family: sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }
        #top-bar {
            width: 100%; height: 60px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; background: rgba(0,255,204,0.1);
            border-bottom: 1px solid #003333;
        }
        #game-container {
            position: relative; margin-top: 20px;
            width: 90vw; height: 90vw; max-width: 450px; max-height: 450px;
        }
        canvas { 
            display: block; width: 100%; height: 100%; 
            border-radius: 50%; border: 2px solid #003333;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; border-radius: 50%;
        }
        #game-over.visible { display: flex; }
        .btn {
            padding: 10px 20px; background: none; border: 2px solid var(--accent-color);
            color: var(--accent-color); font-family: 'Press Start 2P'; font-size: 12px;
            cursor: pointer; margin-top: 20px;
        }
        #pi-display { font-family: 'VT323'; color: var(--accent-color); margin-top: 10px; font-size: 18px; }
        #target-box { font-family: 'Press Start 2P'; font-size: 14px; margin: 10px; color: #ff3366; }
    </style>
</head>
<body>

    <div id=""top-bar"">
        <div style=""font-family:'Press Start 2P'; font-size:10px;"">PI POLAR</div>
        <div id=""score-board"" style=""font-family:'VT323'; font-size:24px;"">SCORE: 0</div>
    </div>

    <div id=""target-box"">NEXT: <span id=""target-digit"">1</span></div>

    <div id=""game-container"">
        <canvas id=""gameCanvas""></canvas>
        <div id=""game-over"" class=""overlay"">
            <h2 style=""color:#ff3366; font-family:'Press Start 2P'; font-size:18px;"">CRASHED</h2>
            <p id=""final-stat""></p>
            <button class=""btn"" onclick=""resetGame()"">RECALIBRATE</button>
        </div>
    </div>

    <div id=""pi-display"">3.</div>
    <div style=""font-size:10px; color:#555; margin-top:10px;"">Swipe to Move | ⬆️ Out ⬇️ In ⬅️ CCW ➡️ CW</div>

    <script>
        const canvas = document.getElementById(""gameCanvas"");
        const ctx = canvas.getContext(""2d"");
        const PI_STR = ""14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196"";
        
        const GRID_R = 10; 
        const GRID_TH = 36;
        const SIZE = 800; // 内部逻辑高分辨率
        const CX = 400, CY = 400, MAX_R = 380;
        const DR = MAX_R / GRID_R;

        let snake, chars, dr, dth, piIdx, nodes, isGameOver, lastTime;

        function init() {
            canvas.width = SIZE; canvas.height = SIZE;
            resetGame();
            requestAnimationFrame(tick);
        }

        function resetGame() {
            // 1. 初始化基站 (0-9)
            nodes = [];
            for(let i=0; i<10; i++) {
                nodes.push({
                    val: i.toString(),
                    r: Math.floor(Math.random() * (GRID_R - 2)) + 2, 
                    th: Math.floor(Math.random() * GRID_TH)
                });
            }

            // 2. 初始化蛇 (确保不撞基站)
            snake = [{r: 5, th: 18}]; 
            chars = [""3.""];
            piIdx = 0; dr = 0; dth = 0;
            isGameOver = false;
            document.getElementById('game-over').classList.remove('visible');
            updateUI();
        }

        function updateUI() {
            document.getElementById('target-digit').innerText = PI_STR[piIdx];
            document.getElementById('score-board').innerText = ""SCORE: "" + piIdx;
            document.getElementById('pi-display').innerText = ""3."" + PI_STR.substring(0, piIdx);
        }

        function tick(timestamp) {
            if(!lastTime) lastTime = timestamp;
            if(!isGameOver && timestamp - lastTime > 150) { // 控制速度
                update();
                lastTime = timestamp;
            }
            draw();
            requestAnimationFrame(tick);
        }

        function update() {
            if(dr === 0 && dth === 0) return;

            let head = { r: snake[0].r + dr, th: (snake[0].th + dth + GRID_TH) % GRID_TH };

            // 边界碰撞
            if(head.r < 1 || head.r > GRID_R) return die();
            // 自撞
            if(snake.some(s => s.r === head.r && s.th === head.th)) return die();

            snake.unshift(head);

            // 基站检测
            let node = nodes.find(n => n.r === head.r && n.th === head.th);
            if(node) {
                if(node.val === PI_STR[piIdx]) {
                    chars.push(PI_STR[piIdx++]);
                    updateUI();
                } else {
                    return die(); // 撞错基站
                }
            } else {
                snake.pop();
            }
        }

        function die() {
            isGameOver = true;
            document.getElementById('game-over').classList.add('visible');
            document.getElementById('final-stat').innerText = ""Reached: "" + piIdx;
        }

        function draw() {
            ctx.fillStyle = ""#050510"";
            ctx.fillRect(0,0,SIZE,SIZE);

            // 画网格
            ctx.strokeStyle = ""rgba(0, 255, 204, 0.1)"";
            for(let i=1; i<=GRID_R; i++){
                ctx.beginPath(); ctx.arc(CX, CY, i*DR, 0, Math.PI*2); ctx.stroke();
            }

            // 画基站
            nodes.forEach(n => {
                let ang = n.th * (Math.PI*2/GRID_TH);
                let x = CX + (n.r - 0.5) * DR * Math.cos(ang);
                let y = CY + (n.r - 0.5) * DR * Math.sin(ang);
                let isTarget = (n.val === PI_STR[piIdx]);
                
                ctx.fillStyle = isTarget ? ""#00ffcc"" : ""#330011"";
                ctx.font = isTarget ? ""bold 30px Arial"" : ""20px Arial"";
                ctx.textAlign = ""center""; ctx.textBaseline = ""middle"";
                ctx.fillText(n.val, x, y);
            });

            // 画蛇
            snake.forEach((s, i) => {
                let ang = s.th * (Math.PI*2/GRID_TH);
                let x = CX + (s.r - 0.5) * DR * Math.cos(ang);
                let y = CY + (s.r - 0.5) * DR * Math.sin(ang);
                ctx.fillStyle = i === 0 ? ""#fff"" : ""rgba(0, 255, 204, 0.6)"";
                ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI*2); ctx.fill();
            });
        }

        // 交互逻辑
        let startX, startY;
        window.addEventListener('touchstart', e => { 
            startX = e.touches[0].clientX; startY = e.touches[0].clientY; 
        }, {passive: false});

        window.addEventListener('touchend', e => {
            let dx_t = e.changedTouches[0].clientX - startX;
            let dy_t = e.changedTouches[0].clientY - startY;
            if(Math.abs(dx_t) > Math.abs(dy_t)) {
                if(Math.abs(dx_t) > 20) { dth = dx_t > 0 ? 1 : -1; dr = 0; }
            } else {
                if(Math.abs(dy_t) > 20) { dr = dy_t > 0 ? -1 : 1; dth = 0; }
            }
        });

        window.onkeydown = e => {
            if(e.key === ""ArrowUp"") { dr = 1; dth = 0; }
            if(e.key === ""ArrowDown"") { dr = -1; dth = 0; }
            if(e.key === ""ArrowLeft"") { dth = -1; dr = 0; }
            if(e.key === ""ArrowRight"") { dth = 1; dr = 0; }
        };

        init();
    </script>
</body>
</html>
