<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圆周率贪吃蛇 v4.0 - 霓虹炫波版</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Pixelify+Sans&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ecf0f1;
            --accent-color: #f1c40f;
            --main-font: 'Segoe UI', sans-serif;
            --ui-bg: rgba(255, 255, 255, 0.05);
            --border-color: #444;
        }

        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--main-font);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; transition: background-color 0.5s;
        }

        #top-bar {
            width: 100%; height: 50px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 15px; background: var(--ui-bg);
            border-bottom: 2px solid var(--border-color); z-index: 50;
        }

        #menu-btn { background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        #menu-btn:hover { opacity: 1; }

        #game-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 10px; }

        #game-area { position: relative; border-radius: 12px; border: 4px solid var(--border-color); overflow: hidden; background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        canvas { display: block; touch-action: none; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 40; color: white; padding: 20px;
            backdrop-filter: blur(5px);
        }

        #settings-menu.visible, #game-over.visible { display: flex; }

        .setting-item { margin: 12px 0; display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 320px; }
        label { font-weight: bold; font-size: 14px; opacity: 0.9; }
        select { padding: 8px; font-size: 14px; border-radius: 6px; width: 180px; background: #2c3e50; color: white; border: 1px solid #444; }
        
        button.action-btn { padding: 12px 24px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; transition: background 0.2s; }
        button.action-btn:hover { background: #27ae60; }

        #pi-display { margin-top: 15px; font-size: 16px; color: var(--accent-color); text-align: center; max-width: 500px; word-break: break-all; font-family: 'Courier New', monospace; letter-spacing: 1px; opacity: 0.8; }
        #target-digit-container { margin-bottom: 15px; font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <h1 style="font-size:18px; margin:0; letter-spacing:1px;">π SNAKE <span style="font-size:12px; opacity:0.5;">v4.0</span></h1>
        <button id="menu-btn">⚙️</button>
    </div>

    <div id="game-wrapper">
        <div id="target-digit-container">
            寻找数字: <span id="target-digit" style="color:#e74c3c; font-size: 32px; font-family: 'Press Start 2P', cursive;">1</span>
        </div>
        
        <div id="game-area">
            <canvas id="gameCanvas"></canvas>
            
            <div id="game-over" class="overlay">
                <h2 style="font-size:36px; color:#e74c3c;">Game Over</h2>
                <p style="font-size:18px;">You have reached<span id="final-score" style="font-weight:bold; color:#f1c40f;">0</span> of π</p>
                <button id="reset-btn" class="action-btn">Restart</button>
            </div>

            <div id="settings-menu" class="overlay">
                <h2 style="margin-top:0; font-size:28px;">Settings</h2>
                
                <div class="setting-item">
                    <label>Styles:</label>
                    <select id="theme-select">
                        <option value="neon" selected>Neon</option>
                        <option value="retro">Retro</option>
                        <option value="default">Default</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>Font:</label>
                    <select id="font-select">
                        <option value="'Press Start 2P'">Press Start</option>
                        <option value="'VT323'">VT323</option>
                        <option value="'Silkscreen'">Silkscreen</option>
                        <option value="'Pixelify Sans'">Pixelify</option>
                        <option value="Arial">Arial</option>
                        <option value="'Comic Sans MS'">Comic Sans</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>Speed:</label>
                    <select id="speed-select">
                        <option value="150" selected>Slow</option>
                        <option value="100">Mid</option>
                        <option value="60">Fast</option>
                    </select>
                </div>

                <button id="save-settings-btn" class="action-btn">开始/继续</button>
            </div>
        </div>
        <div id="pi-display">3.</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const piDisplayEl = document.getElementById("pi-display");
        const targetDigitEl = document.getElementById("target-digit");
        const gameOverScreen = document.getElementById("game-over");
        const settingsMenu = document.getElementById("settings-menu");
        const finalScoreEl = document.getElementById("final-score");

        const PI_DIGITS = "14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196";

        const GRID = 20; 
        const SIZE = 500; 
        const TILE = SIZE / GRID;

        let snake, chars, dx, dy, food, piIndex, gameOver, gameLoop;
        let isPaused = false;
        let currentFont = "'Press Start 2P'"; 
        let activeTheme = "neon";
        let neonHue = 0; // 全局色相时间

        const themes = {
            default: { bg: "#34495e", head: "#2ecc71", body: "#1abc9c", food: "#e74c3c", glow: false, wave: false },
            retro:   { bg: "#1a1a1a", head: "#ffffff", body: "#555555", food: "#ff0000", glow: false, wave: false },
            // 霓虹模式开启 wave 属性
            neon:    { bg: "#000000", head: "#ffffff", body: "#ffffff", food: "#39ff14", glow: true, wave: true }
        };

        function init() {
            canvas.width = SIZE; canvas.height = SIZE;
            resize();
            window.addEventListener('resize', resize);
            document.getElementById("menu-btn").onclick = toggleSettings;
            document.getElementById("save-settings-btn").onclick = toggleSettings;
            document.getElementById("reset-btn").onclick = resetGame;
            document.getElementById("font-select").onchange = (e) => currentFont = e.target.value;
            document.getElementById("theme-select").onchange = (e) => activeTheme = e.target.value;
            
            resetGame();
            requestAnimationFrame(drawLoop); // 启动 60FPS 渲染循环
        }

        function resize() {
            let dim = Math.min(window.innerWidth - 40, window.innerHeight - 250, SIZE);
            canvas.style.width = dim + "px";
            canvas.style.height = dim + "px";
        }

        function resetGame() {
            snake = [{x: 10, y: 10}]; chars = ["3."];
            dx = 0; dy = 0; piIndex = 0; gameOver = false; isPaused = false;
            gameOverScreen.classList.remove("visible");
            spawnFood();
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(updatePhysics, 150);
            updateUI();
        }

        function spawnFood() {
            food = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
        }

        function updateUI() {
            targetDigitEl.innerText = PI_DIGITS[piIndex];
            piDisplayEl.innerText = chars.join("");
        }

        function updatePhysics() {
            if (gameOver || isPaused || (dx === 0 && dy === 0)) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x<0 || head.x>=GRID || head.y<0 || head.y>=GRID) return endGame();
            for (let s of snake) if (s.x === head.x && s.y === head.y) return endGame();
            
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                chars.push(PI_DIGITS[piIndex++]);
                spawnFood();
                updateUI();
            } else { snake.pop(); }
        }

        // ============ 核心渲染循环 (60 FPS) ============
        function drawLoop() {
            let t = themes[activeTheme];
            
            // 1. 全局时间递增
            neonHue = (neonHue + 4) % 360; 

            // 2. 绘制背景
            ctx.fillStyle = t.bg;
            ctx.fillRect(0, 0, SIZE, SIZE);

            // 3. 设置基础字体样式
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            let fontSize = (currentFont.includes('Press Start')) ? TILE * 0.6 : TILE * 0.8;
            ctx.font = "bold " + fontSize + "px " + currentFont;

            // 4. 绘制食物
            ctx.shadowBlur = t.glow ? 20 : 0;
            ctx.shadowColor = t.food;
            ctx.fillStyle = t.food;
            ctx.fillText(PI_DIGITS[piIndex], food.x * TILE + TILE/2, food.y * TILE + TILE/2);

            // 5. 绘制蛇 (核心特效所在)
            snake.forEach((s, i) => {
                let cellColor;
                
                if (t.wave) {
                    // === 炫波特效逻辑 ===
                    // i 是身体的索引（0是头，1是脖子...）
                    // 我们给每一节一个色相偏移：neonHue - i * 延迟系数
                    let hueOffset = 15; // 颜色在相邻数字间传播的延迟量
                    let currentCellHue = (neonHue - i * hueOffset + 360) % 360;
                    
                    // 蛇头稍微亮一点，身体保持高饱和度
                    let lightness = (i === 0) ? '70%' : '55%';
                    cellColor = `hsl(${currentCellHue}, 100%, ${lightness})`;
                } else {
                    // 经典逻辑
                    cellColor = (i === 0) ? t.head : t.body;
                }

                ctx.shadowBlur = t.glow ? 15 : 0;
                ctx.shadowColor = cellColor;
                ctx.fillStyle = cellColor;
                ctx.fillText(chars[i], s.x * TILE + TILE/2, s.y * TILE + TILE/2);
            });

            // 6. 循环调用
            requestAnimationFrame(drawLoop);
        }

        function endGame() {
            gameOver = true; isPaused = true;
            gameOverScreen.classList.add("visible");
            finalScoreEl.innerText = piIndex;
        }

        function toggleSettings() {
            isPaused = !isPaused;
            settingsMenu.classList.toggle("visible");
        }

        // 控制逻辑
        document.onkeydown = e => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
        };

        let tsX, tsY;
        canvas.ontouchstart = e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; };
        canvas.ontouchend = e => {
            let dx_t = e.changedTouches[0].clientX - tsX;
            let dy_t = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx_t) > Math.abs(dy_t)) {
                if (dx_t > 30 && dx === 0) { dx = 1; dy = 0; }
                else if (dx_t < -30 && dx === 0) { dx = -1; dy = 0; }
            } else {
                if (dy_t > 30 && dy === 0) { dx = 0; dy = 1; }
                else if (dy_t < -30 && dy === 0) { dx = 0; dy = -1; }
            }
        };

        init();
    </script>
</body>
</html>
