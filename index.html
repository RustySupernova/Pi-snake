<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圆周率贪吃蛇 v5.0 - 策略挑战版</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Pixelify+Sans&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f0f0f; --text-color: #eee; --accent-color: #f1c40f; --ui-bg: rgba(255, 255, 255, 0.07); }
        * { box-sizing: border-box; -webkit-touch-callout: none; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #top-bar { width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: var(--ui-bg); border-bottom: 1px solid #333; z-index: 50; }
        #menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        #game-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 10px; }
        #game-area { position: relative; border-radius: 12px; border: 3px solid #444; overflow: hidden; background: #000; }
        canvas { display: block; touch-action: none; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.92); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 40; padding: 20px; backdrop-filter: blur(8px); }
        #settings-menu.visible, #game-over.visible { display: flex; }

        .setting-item { margin: 15px 0; display: flex; flex-direction: column; width: 100%; max-width: 300px; gap: 8px; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #2ecc71; }
        select { padding: 10px; border-radius: 6px; background: #222; color: white; border: 1px solid #444; width: 100%; }
        
        button.action-btn { padding: 12px 30px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; }
        
        #pi-display { margin-top: 15px; font-size: 14px; color: #888; text-align: center; max-width: 500px; word-break: break-all; height: 40px; overflow: hidden; }
        .stat-box { display: flex; gap: 20px; margin-bottom: 10px; font-family: 'VT323', monospace; font-size: 20px; }
        .danger { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
    </style>
</head>
<body>

    <div id="top-bar">
        <h1 style="font-size:16px; letter-spacing:2px;">PI SNAKE EVOLUTION</h1>
        <button id="menu-btn">⚙️</button>
    </div>

    <div id="game-wrapper">
        <div class="stat-box">
            <div>长度: <span id="score" style="color:#2ecc71">1</span></div>
            <div>目标: <span id="target-digit" class="danger">1</span></div>
        </div>
        
        <div id="game-area">
            <canvas id="gameCanvas"></canvas>
            
            <div id="game-over" class="overlay">
                <h2 style="font-size:40px; color:#ff4757;">挑战失败</h2>
                <p>最终成绩: 第 <span id="final-score" style="color:#f1c40f">0</span> 位</p>
                <button id="reset-btn" class="action-btn">再试一次</button>
            </div>

            <div id="settings-menu" class="overlay">
                <h2 style="margin-bottom:20px;">控制台</h2>
                
                <div class="setting-item">
                    <div class="row"><label>反应速度 (1-10):</label> <span id="speed-val">5</span></div>
                    <input type="range" id="speed-slider" min="1" max="10" value="5">
                </div>

                <div class="setting-item">
                    <label>难度等级:</label>
                    <select id="diff-select">
                        <option value="easy">初级 (常规模式)</option>
                        <option value="mid">中级 (定时消失)</option>
                        <option value="hard">高级 (多重误导+惩罚)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>渲染风格:</label>
                    <select id="theme-select">
                        <option value="neon">霓虹波浪</option>
                        <option value="retro">复古像素</option>
                    </select>
                </div>

                <button id="save-settings-btn" class="action-btn">进入系统</button>
            </div>
        </div>
        <div id="pi-display">3.</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const targetDigitEl = document.getElementById("target-digit");
        const piDisplayEl = document.getElementById("pi-display");
        const scoreEl = document.getElementById("score");
        
        const PI_DIGITS = "14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196";

        const GRID = 20, SIZE = 500, TILE = SIZE / GRID;

        let snake, chars, dx, dy, piIndex, gameOver, physicsTimer;
        let isPaused = false;
        let speed = 5;
        let difficulty = "easy"; // easy, mid, hard
        let theme = "neon";
        let foodItems = []; // {x, y, digit, spawnTime, isCorrect}
        let globalHue = 0;

        function init() {
            canvas.width = SIZE; canvas.height = SIZE;
            resize(); window.onresize = resize;
            
            document.getElementById("menu-btn").onclick = toggleSettings;
            document.getElementById("save-settings-btn").onclick = toggleSettings;
            document.getElementById("reset-btn").onclick = resetGame;
            
            document.getElementById("speed-slider").oninput = (e) => {
                speed = parseInt(e.target.value);
                document.getElementById("speed-val").innerText = speed;
                updatePhysicsInterval();
            };
            
            document.getElementById("diff-select").onchange = (e) => difficulty = e.target.value;
            document.getElementById("theme-select").onchange = (e) => theme = e.target.value;

            resetGame();
            requestAnimationFrame(renderLoop);
        }

        function updatePhysicsInterval() {
            if(physicsTimer) clearInterval(physicsTimer);
            // 速度映射：1->350ms, 5->150ms, 10->50ms
            const ms = 400 - (speed * 35);
            physicsTimer = setInterval(updatePhysics, ms);
        }

        function resetGame() {
            snake = [{x: 10, y: 10}]; chars = ["3."];
            dx = 0; dy = 0; piIndex = 0; gameOver = false; isPaused = false;
            foodItems = [];
            document.getElementById("game-over").classList.remove("visible");
            spawnFoodLogic();
            updateUI();
            updatePhysicsInterval();
        }

        function spawnFoodLogic() {
            const now = Date.now();
            // 清理逻辑：移除超时的数字
            if (difficulty !== 'easy') {
                foodItems = foodItems.filter(f => {
                    const age = (now - f.spawnTime) / 1000;
                    return age < 20; // 15秒常规 + 5秒闪烁 = 20秒总寿命
                });
            }

            // 生成逻辑
            const maxFood = (difficulty === 'hard') ? 3 : 1;
            
            // 确保场上总有一个是正确的
            let hasCorrect = foodItems.some(f => f.isCorrect);
            
            while (foodItems.length < maxFood) {
                let newX, newY, overlap;
                do {
                    newX = Math.floor(Math.random()*GRID);
                    newY = Math.floor(Math.random()*GRID);
                    overlap = snake.some(s => s.x === newX && s.y === newY) || 
                              foodItems.some(f => f.x === newX && f.y === newY);
                } while (overlap);

                let digit;
                let isCorrect = false;

                if (!hasCorrect) {
                    digit = PI_DIGITS[piIndex];
                    isCorrect = true;
                    hasCorrect = true;
                } else {
                    // 生成干扰数字（随机0-9，但不是当前的正确数字）
                    do { digit = Math.floor(Math.random()*10).toString(); } 
                    while (digit === PI_DIGITS[piIndex]);
                }

                foodItems.push({ x: newX, y: newY, digit, spawnTime: Date.now(), isCorrect });
            }
        }

        function updatePhysics() {
            if (gameOver || isPaused || (dx === 0 && dy === 0)) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 撞墙或撞身
            if (head.x<0 || head.x>=GRID || head.y<0 || head.y>=GRID) return endGame();
            for (let s of snake) if (s.x === head.x && s.y === head.y) return endGame();

            // 检查是否吃到东西
            const foodIndex = foodItems.findIndex(f => f.x === head.x && f.y === head.y);
            
            if (foodIndex !== -1) {
                const eaten = foodItems[foodIndex];
                if (eaten.isCorrect) {
                    // 吃对数字：增长
                    chars.push(eaten.digit);
                    piIndex++;
                    foodItems = []; // 清空重新生成
                } else {
                    // 吃错数字（仅高级难度有此逻辑，但代码通用）
                    if (snake.length > 1) {
                        snake.pop(); // 惩罚：缩短长度
                        chars.pop();
                    } else {
                        return endGame(); // 只有头时吃错直接死
                    }
                }
                spawnFoodLogic();
                updateUI();
            } else {
                snake.pop();
            }

            snake.unshift(head);
            if (difficulty !== 'easy') spawnFoodLogic(); // 定时刷新检查
        }

        function renderLoop() {
            globalHue = (globalHue + 2) % 360;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, SIZE, SIZE);

            const now = Date.now();

            // 绘制数字（食物）
            foodItems.forEach(f => {
                const age = (now - f.spawnTime) / 1000;
                let alpha = 1;
                
                // 15-20秒闪烁效果
                if (difficulty !== 'easy' && age > 15) {
                    alpha = (Math.floor(now / 200) % 2 === 0) ? 0.3 : 1;
                }

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.font = `bold ${TILE*0.7}px 'Press Start 2P'`;
                
                if (theme === 'neon') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = f.isCorrect ? "#39ff14" : "#ff4757";
                }
                ctx.fillStyle = f.isCorrect ? "#39ff14" : "#ff4757";
                ctx.fillText(f.digit, f.x * TILE + TILE/2, f.y * TILE + TILE/2);
                ctx.restore();
            });

            // 绘制蛇
            snake.forEach((s, i) => {
                let color;
                if (theme === 'neon') {
                    const h = (globalHue - i * 15) % 360;
                    color = `hsl(${h}, 100%, 60%)`;
                    ctx.shadowBlur = 10; ctx.shadowColor = color;
                } else {
                    color = (i === 0) ? "#fff" : "#777";
                }
                ctx.fillStyle = color;
                ctx.font = `bold ${TILE*0.8}px 'VT323'`;
                ctx.fillText(chars[i], s.x * TILE + TILE/2, s.y * TILE + TILE/2);
            });

            requestAnimationFrame(renderLoop);
        }

        function updateUI() {
            targetDigitEl.innerText = PI_DIGITS[piIndex];
            scoreEl.innerText = chars.length;
            piDisplayEl.innerText = chars.join("");
        }

        function endGame() {
            gameOver = true;
            document.getElementById("game-over").classList.add("visible");
            document.getElementById("final-score").innerText = piIndex;
            clearInterval(physicsTimer);
        }

        function toggleSettings() {
            isPaused = !isPaused;
            document.getElementById("settings-menu").classList.toggle("visible");
        }

        function resize() {
            let dim = Math.min(window.innerWidth - 30, window.innerHeight - 240, SIZE);
            canvas.style.width = dim + "px"; canvas.style.height = dim + "px";
        }

        // 控制
        window.onkeydown = e => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
        };

        let tsX, tsY;
        canvas.ontouchstart = e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; };
        canvas.ontouchend = e => {
            let dx_t = e.changedTouches[0].clientX - tsX;
            let dy_t = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx_t) > Math.abs(dy_t)) {
                if (dx_t > 30 && dx === 0) { dx = 1; dy = 0; }
                else if (dx_t < -30 && dx === 0) { dx = -1; dy = 0; }
            } else {
                if (dy_t > 30 && dy === 0) { dx = 0; dy = 1; }
                else if (dy_t < -30 && dy === 0) { dx = 0; dy = -1; }
            }
        };

        init();
    </script>
</body>
</html>
